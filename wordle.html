<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign-In Example</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <!-- Google Sign-In Button -->
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID"
         data-context="signin"
         data-ux_mode="popup"
         data-callback="onSignIn"
         data-auto_prompt="false">
    </div>

    <div class="g_id_signin" data-type="standard"></div>
    
    <!-- Logout Button -->
    <button id="logoutButton" style="display:none;" onclick="signOut()">Logout</button>

    <script>
        function onSignIn(response) {
            const profile = response.credential;
            console.log("ID Token: " + profile);

            // Hide the Google Sign-In button and show the Logout button
            document.querySelector(".g_id_signin").style.display = "none";
            document.getElementById("logoutButton").style.display = "inline";
        }

        function signOut() {
            google.accounts.id.disableAutoSelect();
            
            // Show the Google Sign-In button and hide the Logout button
            document.querySelector(".g_id_signin").style.display = "inline";
            document.getElementById("logoutButton").style.display = "none";
        }
    </script>
</body>
</html>
